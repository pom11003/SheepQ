services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sheep_q_development
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/sheep_q_development
      RAILS_ENV: development
    ports:
      - "3001:3000"
    depends_on:
      - db
    volumes:
      - ./apps/api:/app

volumes:
  db_data:
