api:
  build:
    context: ./apps/api
    dockerfile: Dockerfile.dev
  environment:
    DATABASE_URL: postgres://postgres:postgres@db:5432/sheep_q_development
    RAILS_ENV: development
  ports:
    - "3001:3000"
  depends_on:
    - db
  command: bash -lc "bin/rails server -b 0.0.0.0 -p 3000"
  volumes:
    - ./apps/api:/app
