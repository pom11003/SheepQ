services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sheep_q_development
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/sheep_q_development
      RAILS_ENV: development
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXP_HOURS: ${JWT_EXP_HOURS:-24}
    ports:
      - '3001:3000'
    depends_on:
      - db
    command: bash -lc "bin/rails server -b 0.0.0.0 -p 3000"
    volumes:
      - ./apps/api:/app
      - bundle:/usr/local/bundle
volumes:
  db_data:
  web_node_modules:
  bundle:
